name = "oref-ingestion"
main = "src/index.js"
compatibility_date = "2024-01-01"

[vars]
HISTORY_PROXY_URL = "https://proxy1.oref-proxy1.workers.dev"

[triggers]
crons = ["1/2 * * * *"]

[observability]
enabled = true

[[r2_buckets]]
binding = "HISTORY_BUCKET"
bucket_name = "oref-history"

# Optional: mirror ingested entries into D1 for stats APIs.
# [[d1_databases]]
# binding = "STATS_DB"
# database_name = "oref-stats"
# database_id = "<replace-with-d1-database-id>"
